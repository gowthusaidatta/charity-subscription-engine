server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/golf_charity}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    monthly-price-id: ${STRIPE_MONTHLY_PRICE_ID:}
    yearly-price-id: ${STRIPE_YEARLY_PRICE_ID:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  billing:
    monthly-fee: ${MONTHLY_FEE:49.00}
    yearly-fee: ${YEARLY_FEE:499.00}
  prize:
    pool-percent: ${PRIZE_POOL_PERCENT:40.00}
    tier5-percent: ${PRIZE_TIER5_PERCENT:40.00}
    tier4-percent: ${PRIZE_TIER4_PERCENT:35.00}
    tier3-percent: ${PRIZE_TIER3_PERCENT:25.00}
  draw:
    monthly-cron: ${DRAW_MONTHLY_CRON:0 0 1 1 * *}
    monthly-mode: ${DRAW_MONTHLY_MODE:RANDOM}
  notifications:
    email-enabled: ${EMAIL_NOTIFICATIONS_ENABLED:false}
    from-email: ${MAIL_FROM:no-reply@golfcharity.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs
